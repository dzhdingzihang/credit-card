name: Keep Render Warm

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping health check
        run: |
          for attempt in 1 2 3; do
            if curl --fail --silent --show-error --max-time 20 https://kahuasuan.onrender.com/healthz; then
              exit 0
            fi
            sleep 10
          done
          exit 1
