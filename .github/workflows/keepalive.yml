name: Keep Render Warm

on:
  schedule:
    - cron: "2-59/5 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping health check
        run: |
          urls=(
            "https://banka.alixjd.com/healthz"
            "https://kahuasuan.onrender.com/healthz"
          )

          for url in "${urls[@]}"; do
            for attempt in 1 2 3; do
              if curl --fail --silent --show-error --max-time 20 "$url"; then
                break
              fi
              if [ "$attempt" = "3" ]; then
                exit 1
              fi
              sleep 10
            done
          done
